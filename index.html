<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS ULTIMATE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --p1: #00f3ff; --p2: #ff00f7; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* --- UI MANAGEMENT --- */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        .active { display: flex; }
        .card { background: #111; border: 2px solid var(--p1); padding: 30px; border-radius: 20px; text-align: center; width: 300px; box-shadow: 0 0 20px rgba(0,243,255,0.2); }
        
        /* --- INPUTS & BTNS --- */
        input { background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; width: 85%; margin-bottom: 15px; font-family: 'Orbitron'; text-align: center; }
        .btn { display: block; width: 100%; padding: 15px; margin: 5px 0; background: none; border: 1px solid var(--p1); color: var(--p1); border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: var(--p1); color: #000; }

        /* --- HUD --- */
        .hud { position: absolute; width: 100%; max-width: 400px; padding: 15px; }
        .top { top: 0; transform: rotate(180deg); }
        .bottom { bottom: 0; }
        .hp-bar { height: 14px; background: #222; border-radius: 7px; overflow: hidden; border: 1px solid #444; margin: 10px 0; }
        .fill { height: 100%; width: 100%; transition: 0.6s cubic-bezier(0.2, 1, 0.2, 1); }
        .moves { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .m-btn { background: #000; border: 2px solid white; color: white; padding: 20px; border-radius: 15px; font-size: 1.8rem; }

        #status-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; color: #ffcc00; font-size: 1.2rem; }
        #debug { position: fixed; bottom: 0; left: 0; font-size: 8px; color: #555; padding: 5px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="debug">SYSTEM READY</div>

    <div id="scr-login" class="screen active">
        <div class="card">
            <h2>NEXUS LOGIN</h2>
            <input type="text" id="username" placeholder="NAME">
            <button class="btn" onclick="app.login()">ENTER ARENA</button>
        </div>
    </div>

    <div id="scr-menu" class="screen">
        <div class="card">
            <h3 id="user-display">---</h3>
            <button class="btn" onclick="app.startMode('OFFLINE')">🕹️ VS BOT</button>
            <button class="btn" onclick="app.startMode('LOCAL')">⚔️ LOCAL 1V1</button>
            <button class="btn" onclick="app.showOnline()">🌍 ONLINE</button>
            <button class="btn" onclick="app.logout()" style="border-color:#444; color:#444; font-size: 10px;">LOGOUT</button>
        </div>
    </div>

    <div id="scr-online" class="screen">
        <div class="card">
            <p>ID: <b id="my-word-id" style="color:var(--p1)">---</b></p>
            <input type="text" id="target-id" placeholder="FRIEND ID">
            <button class="btn" onclick="app.connect()">CONNECT</button>
            <button class="btn" onclick="app.showMenu()">BACK</button>
        </div>
    </div>

    <div id="scr-game" class="screen">
        <button onclick="location.reload()" style="position:absolute; left:10px; top:50%; z-index:100; background:none; border:1px solid #444; color:#444; border-radius:50%; width:30px; height:30px;">✖</button>
        
        <div class="hud top">
            <div class="hp-bar"><div id="p2-fill" class="fill" style="background:var(--p2)"></div></div>
            <div class="moves" id="p2-btns"><button class="m-btn" onclick="app.input(2,'stone')">✊</button><button class="m-btn" onclick="app.input(2,'paper')">✋</button><button class="m-btn" onclick="app.input(2,'scissors')">✌️</button></div>
        </div>

        <div id="status-msg">READY?</div>

        <div class="hud bottom">
            <div class="moves"><button class="m-btn" onclick="app.input(1,'stone')">✊</button><button class="m-btn" onclick="app.input(1,'paper')">✋</button><button class="m-btn" onclick="app.input(1,'scissors')">✌️</button></div>
            <div class="hp-bar"><div id="p1-fill" class="fill" style="background:var(--p1)"></div></div>
        </div>
    </div>

<script>
const app = {
    user: localStorage.getItem('nexusUser'),
    peer: null, conn: null, mode: 'OFFLINE',
    p1HP: 100, p2HP: 100, p1M: null, p2M: null,

    init() {
        if(this.user) this.showMenu();
    },

    login() {
        let name = document.getElementById('username').value.trim();
        if(name.length < 2) return alert("Name too short");
        this.user = name.replace(/\s/g, '');
        localStorage.setItem('nexusUser', this.user);
        this.showMenu();
    },

    logout() {
        localStorage.removeItem('nexusUser');
        location.reload();
    },

    showMenu() {
        document.getElementById('user-display').innerText = "PILOT: " + this.user.toUpperCase();
        this.switch('scr-menu');
        this.setupPeer();
    },

    setupPeer() {
        if(this.peer) return;
        // Generate a clean ID: name + random 4 digits
        const id = this.user.toLowerCase() + "-" + Math.floor(1000 + Math.random()*9000);
        document.getElementById('my-word-id').innerText = id.toUpperCase();
        
        this.peer = new Peer(id);
        this.peer.on('open', () => this.log("Server: Online"));
        this.peer.on('connection', c => {
            this.conn = c;
            this.handleConn();
            this.startMode('ONLINE');
        });
        this.peer.on('error', e => alert("Connection Error: " + e.type));
    },

    showOnline() { this.switch('scr-online'); },

    connect() {
        let tid = document.getElementById('target-id').value.toLowerCase().trim();
        if(!tid) return alert("Enter ID");
        this.log("Linking to " + tid);
        this.conn = this.peer.connect(tid);
        this.handleConn();
    },

    handleConn() {
        this.conn.on('open', () => {
            this.log("Link Success");
            this.startMode('ONLINE');
        });
        this.conn.on('data', data => {
            if(data.move) { this.p2M = data.move; this.check(); }
        });
    },

    startMode(m) {
        this.mode = m; this.p1HP = 100; this.p2HP = 100;
        document.getElementById('p2-btns').style.visibility = (m === 'LOCAL') ? 'visible' : 'hidden';
        this.updateUI(); this.switch('scr-game');
    },

    input(p, m) {
        if(p === 1) {
            if(this.p1M) return;
            this.p1M = m;
            if(this.mode === 'ONLINE' && this.conn) this.conn.send({move: m});
        } else {
            if(this.p2M) return;
            this.p2M = m;
        }
        if(this.mode === 'OFFLINE' && p === 1) this.p2M = ['stone','paper','scissors'][Math.floor(Math.random()*3)];
        document.getElementById('status-msg').innerText = "LOCKED";
        this.check();
    },

    check() {
        if(this.p1M && this.p2M) {
            const win = {stone:'scissors', paper:'stone', scissors:'paper'};
            let txt = (this.p1M === this.p2M) ? "DRAW" : (win[this.p1M] === this.p2M ? (this.p2HP -= 20, "P1 HIT!") : (this.p1HP -= 20, "P2 HIT!"));
            document.getElementById('status-msg').innerText = `${this.p1M} vs ${this.p2M}\n${txt}`;
            this.updateUI();
            this.p1M = null; this.p2M = null;
        }
    },

    updateUI() {
        document.getElementById('p1-fill').style.width = this.p1HP + "%";
        document.getElementById('p2-fill').style.width = this.p2HP + "%";
        if(this.p1HP <= 0 || this.p2HP <= 0) {
            alert(this.p1HP <= 0 ? "P2 WINS" : "P1 WINS");
            location.reload();
        }
    },

    switch(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    },

    log(m) { document.getElementById('debug').innerText = m; console.log(m); }
};

app.init();
</script>
</body>
</html>
