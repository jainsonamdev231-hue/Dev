<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS: ULTRA INSTINCT</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --p1: #00f3ff; --p2: #ff00f7; --ui-aura: rgba(173, 216, 230, 0.4); }
        
        body { 
            margin: 0; 
            background: #000 url('https://images.alphacoders.com/906/906100.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        /* --- UI OVERLAY (Darkens bg slightly for readability) --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: -1;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        .active { display: flex; }

        /* GLASS MORPHISM CARDS */
        .card { 
            background: rgba(0, 0, 0, 0.75); 
            border: 2px solid var(--p1); 
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            width: 280px; 
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px var(--ui-aura);
        }

        input { background: rgba(255,255,255,0.1); border: 1px solid var(--p1); color: white; padding: 12px; border-radius: 8px; width: 85%; margin-bottom: 15px; text-align: center; font-family: 'Orbitron'; }
        
        .btn { 
            display: block; width: 100%; padding: 15px; margin: 5px 0; 
            background: rgba(0, 243, 255, 0.1); border: 1px solid var(--p1); 
            color: var(--p1); border-radius: 10px; cursor: pointer; font-weight: bold; 
            text-transform: uppercase;
        }
        .btn:hover { background: var(--p1); color: #000; box-shadow: 0 0 15px var(--p1); }

        /* --- COMBAT HUD --- */
        .hud { position: absolute; width: 100%; max-width: 400px; padding: 15px; z-index: 10; }
        .top { top: 0; transform: rotate(180deg); }
        .bottom { bottom: 0; }
        
        .hp-bar { height: 16px; background: rgba(0,0,0,0.8); border-radius: 8px; overflow: hidden; border: 1px solid #fff; margin: 5px 0; }
        .fill { height: 100%; width: 100%; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .moves { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .m-btn { 
            background: rgba(0,0,0,0.6); border: 2px solid white; color: white; 
            padding: 20px; border-radius: 15px; font-size: 1.8rem; cursor: pointer;
            backdrop-filter: blur(5px);
        }

        #status-msg { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; width: 100%; color: #fff; font-size: 1.5rem; 
            text-shadow: 0 0 10px var(--p1), 0 0 20px #000; font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div id="scr-login" class="screen active">
        <div class="card">
            <h2 style="color:var(--p1)">UI SENSORY LOGIN</h2>
            <input type="text" id="username" placeholder="FIGHTER NAME">
            <button class="btn" onclick="app.login()">AWAKEN</button>
        </div>
    </div>

    <div id="scr-menu" class="screen">
        <div class="card">
            <h3 id="user-display">---</h3>
            <button class="btn" onclick="app.startMode('OFFLINE')">🕹️ VS CPU</button>
            <button class="btn" onclick="app.startMode('LOCAL')">⚔️ 1V1 LOCAL</button>
            <button class="btn" onclick="app.showOnline()">🌍 ONLINE BATTLE</button>
        </div>
    </div>

    <div id="scr-online" class="screen">
        <div class="card">
            <p>BATTLE ID:<br><b id="my-word-id" style="color:var(--p1)">---</b></p>
            <input type="text" id="target-id" placeholder="OPPONENT ID">
            <button class="btn" onclick="app.connect()">ESTABLISH LINK</button>
            <button class="btn" onclick="app.showMenu()">BACK</button>
        </div>
    </div>

    <div id="scr-game" class="screen">
        <div class="hud top">
            <div class="hp-bar"><div id="p2-fill" class="fill" style="background:linear-gradient(90deg, #ff00f7, #ff80fb)"></div></div>
            <div class="moves" id="p2-btns"><button class="m-btn" onclick="app.input(2,'stone')">✊</button><button class="m-btn" onclick="app.input(2,'paper')">✋</button><button class="m-btn" onclick="app.input(2,'scissors')">✌️</button></div>
        </div>
        
        <div id="status-msg">INSTINCT ACTIVATED</div>

        <div class="hud bottom">
            <div class="moves"><button class="m-btn" onclick="app.input(1,'stone')">✊</button><button class="m-btn" onclick="app.input(1,'paper')">✋</button><button class="m-btn" onclick="app.input(1,'scissors')">✌️</button></div>
            <div class="hp-bar"><div id="p1-fill" class="fill" style="background:linear-gradient(90deg, #00f3ff, #80f9ff)"></div></div>
        </div>
        <button onclick="location.reload()" style="position:absolute; right:10px; top:50%; background:rgba(0,0,0,0.5); border:1px solid white; color:white; border-radius:50%; width:40px; height:40px;">✖</button>
    </div>

<script>
// (Previous stable script logic remains identical for "Managed Sync" and Online)
const app = {
    user: localStorage.getItem('nexusUser'),
    peer: null, conn: null, mode: 'OFFLINE',
    p1HP: 100, p2HP: 100, p1M: null, p2M: null,

    login() {
        let n = document.getElementById('username').value.trim();
        if(n.length < 2) return;
        this.user = n.replace(/\s/g, '');
        localStorage.setItem('nexusUser', this.user);
        this.showMenu();
    },
    showMenu() {
        document.getElementById('user-display').innerText = this.user.toUpperCase();
        this.switch('scr-menu');
        if(!this.peer) this.setupPeer();
    },
    setupPeer() {
        const id = this.user.toLowerCase() + "-" + Math.floor(1000 + Math.random()*9000);
        document.getElementById('my-word-id').innerText = id.toUpperCase();
        this.peer = new Peer(id);
        this.peer.on('connection', c => { this.conn = c; this.handleConn(); });
    },
    showOnline() { this.switch('scr-online'); },
    connect() {
        let tid = document.getElementById('target-id').value.toLowerCase().trim();
        this.conn = this.peer.connect(tid);
        this.handleConn();
    },
    handleConn() {
        this.conn.on('open', () => this.startMode('ONLINE'));
        this.conn.on('data', data => {
            if(data.type === 'move') { this.p2M = data.move; this.check(); }
            if(data.type === 'syncHP') { this.p2HP = data.hp; this.updateUI(); }
        });
    },
    startMode(m) {
        this.mode = m; this.p1HP = 100; this.p2HP = 100;
        document.getElementById('p2-btns').style.visibility = (m === 'LOCAL') ? 'visible' : 'hidden';
        this.updateUI(); this.switch('scr-game');
    },
    input(p, m) {
        if(p === 1) {
            if(this.p1M) return;
            this.p1M = m;
            if(this.mode === 'ONLINE') this.conn.send({type: 'move', move: m});
        } else if(p === 2 && this.mode === 'LOCAL') {
            this.p2M = m;
        }
        if(this.mode === 'OFFLINE') this.p2M = ['stone','paper','scissors'][Math.floor(Math.random()*3)];
        document.getElementById('status-msg').innerText = "LIMIT BREAKER...";
        this.check();
    },
    check() {
        if(this.p1M && this.p2M) {
            const win = {stone:'scissors', paper:'stone', scissors:'paper'};
            let txt = (this.p1M === this.p2M) ? "CLASH!" : (win[this.p1M] === this.p2M ? (this.p2HP -= 20, "GOKU STRIKES!") : (this.p1HP -= 20, "COUNTERED!"));
            if(this.mode === 'ONLINE') this.conn.send({type: 'syncHP', hp: this.p1HP});
            document.getElementById('status-msg').innerText = txt;
            this.updateUI();
            this.p1M = null; this.p2M = null;
        }
    },
    updateUI() {
        document.getElementById('p1-fill').style.width = this.p1HP + "%";
        document.getElementById('p2-fill').style.width = this.p2HP + "%";
        if(this.p1HP <= 0 || this.p2HP <= 0) {
            setTimeout(() => { alert(this.p1HP <= 0 ? "K.O." : "ULTIMATE VICTORY"); location.reload(); }, 500);
        }
    },
    switch(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
};
if(app.user) app.showMenu();
</script>
</body>
</html>
